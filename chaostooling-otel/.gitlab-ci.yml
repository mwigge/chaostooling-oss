include:
  - component: ${CI_SERVER_FQDN}/core/templates/toolkit/semantic-release@~latest

stages:
  - lint
  - test
  - build
  - publish
  - sbom
  - release

variables:
  PDM_CACHE_DIR: ".pdm-cache"
  PIP_CACHE_DIR: ".cache/pip"
  PIP_INDEX_URL: https://$ARTIFACTORY_USERNAME:$ARTIFACTORY_PASSWORD@artifactory.global.ingenico.com/artifactory/api/pypi/remote-global-pypi-release/simple
  VAULT_SERVER_URL: "https://vault.core.emea.giservices.io/"
  VAULT_AUTH_ROLE: "chaostooling-pypi"
  VAULT_AUTH_PATH: "chaostooling/gitlab/jwt"  
image: artifactory.core.emea.giservices.io/remote-global-docker-dockerhub-release/python:3.10-alpine

cache:
  key: ${CI_COMMIT_REF_SLUG}-pdm
  paths:
    - .pdm-cache
    - .cache/pip
    - dist
# Anchor to extend the template's before_script without overwriting it
.before_script_extend:
  before_script:
  - |
    REPO_FILE=/etc/apk/repositories
    if [ -f "$REPO_FILE" ]; then
      # Replace only the host portion, keeping the path suffix
      sed -i.bak \
        -e "s#^https://[^/]\+/#https://artifactory.global.ingenico.com/artifactory/remote-prod_core-alpine-alpine-release/#" \
        "$REPO_FILE"
    else
      echo "Repository file not found: $REPO_FILE" >&2
      exit 1
    fi
  - apk update
  - apk upgrade
  - apk add --no-progress git
  - python --version
  - python -m ensurepip --upgrade
  - pip install --upgrade pdm setuptools wheel uv
  - pdm config pypi.url $PIP_INDEX_URL
  script:
  - echo "Helloworld" 

lint:
  stage: lint
  extends:
    - .before_script_extend
  script:
    - pdm install --dev --quiet --no-editable
    - pdm lint
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  tags:
  - standard.linux.prod
  allow_failure: true


test:
  stage: test
  extends:
    - .before_script_extend
  script:
    - pdm install --dev --quiet --no-editable
    - pdm test
  coverage: /TOTAL\s+\d+\s+%\s+/  
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - coverage.xml
  tags:
  - standard.linux.prod

  # Optional: fail fast if coverage too low (adjust threshold as needed)
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH != "release" || $CI_COMMIT_TAG != null'
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pdm
    paths:
      - .pdm-cache
      - .cache/pip

build_wheel:
  stage: build
  extends:
    - .before_script_extend
  script:
    - pdm build
  artifacts:
    paths:
      - dist/*
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG != null'
  tags:
  - standard.linux.prod

publish_pypi:
  stage: publish
  id_tokens:
    TERRAFORM_VAULT_AUTH_JWT:
      aud: $VAULT_ADDR
  secrets:
    PDM_PUBLISH_PASSWORD:
      vault: global/genesis/stacks/artifactory/runtimes/read/TOKEN_prod_chaostooling-chaostooling_rw_pypi_token/token@chaostooling-prod-emea/postbox/kv2
      token: $TERRAFORM_VAULT_AUTH_JWT
    PDM_PUBLISH_USERNAME:
      vault: global/genesis/stacks/artifactory/runtimes/read/TOKEN_prod_chaostooling-chaostooling_rw_pypi_token/username@chaostooling-prod-emea/postbox/kv2
      token: $TERRAFORM_VAULT_AUTH_JWT
  variables:
    PDM_PUBLISH_REPO: "https://artifactory.global.ingenico.com/artifactory/api/pypi/local-prod_chaostooling-pypi-chaostooling-dev"
  extends:
    - .before_script_extend
  script:
    - if [ -n "$CI_COMMIT_TAG" ]; then pdm publish --no-build --dest dist --skip-existing ; fi
  only:
    - tags
  when: manual
  tags:
  - standard.linux.prod

sbom:
  stage: sbom
  extends:
    - .before_script_extend
  script:
    - pip install cyclonedx-bom
    - if [ -d "dist" ]; then cyclone-dx-bom -o dist/bom.xml; fi
  artifacts:
    paths:
      - dist/bom.xml
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG != null'
      when: on_success
  tags:
  - standard.linux.prod
  dependencies:
    - publish_pypi
  needs:
    - publish_pypi

apiVersion: v1
kind: Namespace
metadata:
  name: baseline-metrics
  labels:
    name: baseline-metrics

---
apiVersion: v1
kind: Secret
metadata:
  name: baseline-metrics-secrets
  namespace: baseline-metrics
type: Opaque
stringData:
  database-url: postgresql://user:password@postgres:5432/baseline_metrics
  # Add more secrets as needed
  # api-key: your-api-key

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: baseline-metrics-config
  namespace: baseline-metrics
data:
  OTEL_SERVICE_NAME: "baseline-metrics"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-metrics
  namespace: baseline-metrics
  labels:
    app: baseline-metrics
    version: v0.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: baseline-metrics
  template:
    metadata:
      labels:
        app: baseline-metrics
        version: v0.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: baseline-metrics
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: baseline-metrics
        image: baseline-metrics:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: baseline-metrics-secrets
              key: database-url
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://tempo-distributor:4317"
        - name: OTEL_SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: baseline-metrics-config
              key: OTEL_SERVICE_NAME
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          valueFrom:
            configMapKeyRef:
              name: baseline-metrics-config
              key: OTEL_EXPORTER_OTLP_PROTOCOL
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: baseline-metrics-config
              key: LOG_LEVEL
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: baseline-metrics-config
              key: ENVIRONMENT
        # Additional env vars from node metadata
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: logs
          mountPath: /var/log/baseline-metrics
      volumes:
      - name: logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - baseline-metrics
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: baseline-metrics
  namespace: baseline-metrics
  labels:
    app: baseline-metrics
spec:
  type: ClusterIP
  sessionAffinity: None
  selector:
    app: baseline-metrics
  ports:
  - name: http
    port: 5000
    targetPort: http
    protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: baseline-metrics
  namespace: baseline-metrics
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: baseline-metrics

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: baseline-metrics
  namespace: baseline-metrics

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: baseline-metrics
  namespace: baseline-metrics
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: baseline-metrics
  namespace: baseline-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: baseline-metrics
subjects:
- kind: ServiceAccount
  name: baseline-metrics
  namespace: baseline-metrics

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: baseline-metrics
  namespace: baseline-metrics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: baseline-metrics
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

# To limit exposure to denial of service attacks, change the host in endpoints below from 0.0.0.0 to a specific network interface.
# See https://github.com/open-telemetry/opentelemetry-collector/blob/main/docs/security-best-practices.md#safeguards-against-denial-of-service-attacks

extensions:
  health_check:
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

connectors:
  servicegraph:
    latency_histogram_buckets: [100ms, 250ms, 1s, 5s, 10s]
    metrics_flush_interval: 10s

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 10        # 100MB max message size
        max_concurrent_streams: 10       # More concurrent streams

      http:
        endpoint: 0.0.0.0:4318
        max_request_body_size: 10485760  # 100MB (default: ~4MB)

  # Collect own metrics
  prometheus:
    config:
      scrape_configs:
      - job_name: 'otel-collector'
        scrape_interval: 10s
        static_configs:
        - targets: ['0.0.0.0:8888']

  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 5s
    timeout: 20s
    api_version: "1.45"
    metrics:
      container.cpu.usage.total:
        enabled: true
      container.network.io.usage.rx_bytes:
        enabled: true
      container.network.io.usage.tx_bytes:
        enabled: true
      container.memory.usage.total:
        enabled: true
      container.memory.usage.limit:
        enabled: true
      container.blockio.io_service_bytes_recursive:
        enabled: true

  # PostgreSQL receiver - collects metrics from primary database
  postgresql:
    endpoint: postgres-primary-site-a:5432
    transport: tcp
    username: ${env:POSTGRES_USER}
    password: ${env:POSTGRES_PASSWORD}
    databases:
      - testdb
    collection_interval: 10s
    initial_delay: 10s
    tls:
      insecure: true

  # PostgreSQL receiver for replica - separate instance to distinguish metrics
  postgresql/replica:
    endpoint: postgres-replica-site-a:5432
    transport: tcp
    username: ${env:POSTGRES_USER}
    password: ${env:POSTGRES_PASSWORD}
    databases:
      - testdb
    collection_interval: 10s
    initial_delay: 10s
    tls:
      insecure: true

  # PostgreSQL receiver for chaos platform database - monitors the metadata store
  postgresql/chaos-platform:
    endpoint: chaos-platform-db:5432
    transport: tcp
    username: ${env:CHAOS_DB_USER}
    password: ${env:CHAOS_DB_PASSWORD}
    databases:
      - chaos_platform
    collection_interval: 10s
    initial_delay: 10s
    tls:
      insecure: true

  # MySQL Receiver
  mysql:
    endpoint: mysql:3306
    username: ${env:MYSQL_USER}
    password: ${env:MYSQL_ROOT_PASSWORD}
    collection_interval: 10s
    initial_delay: 10s

  # MSSQL Receiver
  sqlserver:
    server: mssql
    port: 1433
    username: ${env:MSSQL_USER}
    password: ${env:MSSQL_SA_PASSWORD}
    database: master
    collection_interval: 10s
    initial_delay: 10s

  # MongoDB Receiver
  mongodb:
    hosts:
      - endpoint: mongodb:27017
    collection_interval: 10s
    initial_delay: 10s

  # Redis Receiver
  redis:
    endpoint: redis:6379
    collection_interval: 10s
    initial_delay: 10s

  # RabbitMQ Receiver
  rabbitmq:
    endpoint: http://rabbitmq:15672
    username: ${env:RABBITMQ_USER}
    password: ${env:RABBITMQ_PASSWORD}
    collection_interval: 10s
    initial_delay: 10s

  # JMX Receiver for Cassandra
  jmx/cassandra:
    endpoint: cassandra:7199
    target_system: cassandra
    collection_interval: 10s
    initial_delay: 10s
    jar_path: /opt/opentelemetry-java-contrib-jmx-metrics.jar

  # JMX Receiver for Kafka
  jmx/kafka:
    endpoint: kafka:9999
    target_system: kafka
    collection_interval: 10s
    initial_delay: 10s
    jar_path: /opt/opentelemetry-java-contrib-jmx-metrics.jar

  # JMX Receiver for ActiveMQ
  jmx/activemq:
    endpoint: activemq:1099
    target_system: activemq
    collection_interval: 10s
    initial_delay: 10s
    jar_path: /opt/opentelemetry-java-contrib-jmx-metrics.jar

processors:
  batch:

exporters:
  debug:
    verbosity: detailed
  
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true
    # Tempo’s HTTP OTLP receiver is on 4318; use http exporter to avoid gRPC dial failures.

  prometheus:
    endpoint: "0.0.0.0:8889"
    resource_to_telemetry_conversion:
      enabled: false
    # Disabled to avoid duplicate label names error in v0.117.0
    # Resource attributes are still available via OTLP export to Tempo/Loki

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, servicegraph, debug]

    metrics:
      receivers: [
        otlp,
        prometheus,
        docker_stats,
        postgresql,
        postgresql/replica,
        postgresql/chaos-platform,
        mysql,
        sqlserver,
        mongodb,
        redis,
        rabbitmq,
        jmx/cassandra,
        jmx/kafka,
        jmx/activemq,
        servicegraph
      ]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]

  extensions: [health_check, pprof, zpages]


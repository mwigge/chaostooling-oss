dist:
  name: otelcol-custom
  description: Custom OTel Collector with servicegraph connector and all database/messaging receivers
  output_path: ./otelcol-custom

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.117.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.117.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/dockerstatsreceiver v0.117.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/postgresqlreceiver v0.117.0
  # Database Receivers
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/mysqlreceiver v0.117.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/sqlserverreceiver v0.117.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/mongodbreceiver v0.117.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/redisreceiver v0.117.0
  # JMX Receiver (for Cassandra, Kafka, ActiveMQ)
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/jmxreceiver v0.117.0
  # Messaging Receivers
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/rabbitmqreceiver v0.117.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.117.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.117.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.117.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusexporter v0.117.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.117.0

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.117.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/pprofextension v0.117.0
  - gomod: go.opentelemetry.io/collector/extension/zpagesextension v0.117.0

connectors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/servicegraphconnector v0.117.0

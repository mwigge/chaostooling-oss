global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert-rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape metrics from otel-collector's Prometheus exporter
  # This is the main source of chaos metrics exported via OpenTelemetry
  - job_name: 'otel-collector-chaos'
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics

  # Docker daemon metrics (may not be available in all environments)
  # Uncomment if you have Docker metrics exporter running
  # - job_name: docker
  #   scrape_interval: 15s
  #   static_configs:
  #     - targets: ["host.docker.internal:9323"]

  # Scrape Kafka JMX metrics via JMX Exporter
  - job_name: 'kafka-jmx'
    scrape_interval: 15s
    static_configs:
      - targets: ['kafka:9999']
    metrics_path: /metrics


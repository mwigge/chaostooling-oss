name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: [main, master, develop]

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
          # Install all sub-packages in editable mode for proper linting
          pip install -e ./chaostooling-otel[dev] || echo "Failed to install chaostooling-otel"
          pip install -e ./chaostooling-extension-db[dev] || echo "Failed to install chaostooling-extension-db"
          pip install -e ./chaostooling-extension-compute[dev] || echo "Failed to install chaostooling-extension-compute"
          pip install -e ./chaostooling-extension-network[dev] || echo "Failed to install chaostooling-extension-network"
          pip install -e ./chaostooling-reporting[dev] || echo "Failed to install chaostooling-reporting"
          pip install -e ./chaostoolkit-extension-app[dev] || echo "Failed to install chaostoolkit-extension-app"

      - name: Run Ruff linter
        run: |
          echo "::group::Ruff Linter"
          ruff check --ignore F811,F821 . --output-format=github
          echo "::endgroup::"

      - name: Run Ruff formatter check
        run: |
          echo "::group::Ruff Formatter"
          ruff format --check . || (echo "::error::Code formatting issues found. Run 'ruff format .' to fix." && exit 1)
          echo "::endgroup::"

      - name: Check Black formatting
        run: |
          echo "::group::Black Formatter"
          black --check --diff . || echo "::warning::Code formatting differs from Black (using Ruff as primary formatter). Run 'black .' to see differences."
          echo "::endgroup::"
        continue-on-error: true

      - name: Check isort import sorting
        run: |
          echo "::group::isort Import Sorter"
          isort --check-only --diff . || (echo "::error::Imports are not sorted with isort. Run 'isort .' to fix." && exit 1)
          echo "::endgroup::"

      - name: Run MyPy type checking
        run: |
          echo "::group::MyPy Type Checker"
          mypy . --ignore-missing-imports --show-error-codes --no-error-summary || echo "::warning::MyPy found type issues (non-blocking)"
          echo "::endgroup::"
        continue-on-error: true

      - name: Run Bandit security check
        run: |
          echo "::group::Bandit Security Scanner"
          bandit -r . -f json -o bandit-report.json -ll || echo "::warning::Bandit found security issues (non-blocking)"
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "## Code Quality Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Ruff**: Linting and formatting checks completed" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ **Black**: Code formatting check completed (non-blocking, Ruff is primary)" >> $GITHUB_STEP_SUMMARY
          echo "✅ **isort**: Import sorting check completed" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ **MyPy**: Type checking completed (non-blocking)" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ **Bandit**: Security scan completed (non-blocking)" >> $GITHUB_STEP_SUMMARY

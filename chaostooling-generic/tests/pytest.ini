[pytest]
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require database/external services)
    e2e: End-to-end tests (full workflow from discover to audit)
    slow: Tests that take >1 second to run
    db: Tests that require database connectivity
    flaky: Tests known to be flaky and need investigation

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --tb=short
